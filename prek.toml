exclude = "^(target|node_modules|build|dist|\\.svelte-kit|\\.lock|AGENTS\\.md|docs)/"

fail_fast = true

[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt -- --check"
language = "system"
files = "\\.rs$"

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets -- -D warnings"
language = "system"
files = "\\.rs$"
pass_filenames = false

[[repos.hooks]]
id = "eslint"
name = "eslint"
entry = "bun run lint"
language = "system"
files = "\\.(ts|tsx|svelte)$"
pass_filenames = false

[[repos.hooks]]
id = "prettier"
name = "prettier"
entry = "bun run format --check"
language = "system"
files = "\\.(ts|tsx|svelte|css|json|md)$"
pass_filenames = false

[[repos.hooks]]
id = "svelte-check"
name = "svelte-check"
entry = "bun run check"
language = "system"
files = "\\.(ts|svelte)$"
pass_filenames = false
