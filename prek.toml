exclude = "^(target|node_modules|build|dist|\\.svelte-kit|\\.lock|AGENTS\\.md|docs)/"

fail_fast = true

[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt -- --check"
language = "system"
files = "\\.rs$"

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets -- -D warnings"
language = "system"
files = "\\.rs$"
pass_filenames = false
